!ys-0
meta =: load('../Meta')

--- !data
name: yaml/yamlscript-php
version:: meta.version
description::
  "YAMLScript PHP binding - $(meta.abstract)"
type: library
license:: meta.license:uc
homepage:: meta.homepage
readme: ReadMe.md

authors:
- name:: meta.author.name
  email:: meta.author.email

support:
  source:: meta.devel.git
  docs: https://yamlscript.org/doc/
  issues:: meta.devel.bug
  chat: https://matrix.to/#/#chat-yamlscript:yaml.io

require:
  php: '>=7.4'
  ext-ffi: '*'

require-dev:
  phpunit/phpunit: ^9.5
  squizlabs/php_codesniffer: ^3.7

autoload:
  psr-4:
    YAMLScript\: src/

autoload-dev:
  psr-4:
    YAMLScript\Tests\: tests/

scripts:
  test: phpunit
  cs-check: phpcs
  cs-fix: phpcbf
