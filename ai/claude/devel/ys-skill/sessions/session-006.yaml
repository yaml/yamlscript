    !ys-0

    # json2ys - Convert JSON Schema to YAML Schema (succinct DSL).
    #
    # Reads a JSON Schema document from stdin (when the arg is "-" or omitted)
    # or from a file path, and prints the equivalent YAML Schema in the
    # succinct DSL form described in yaml-schema-language-plan.md.
    #
    # Feature scope (v1): the 15 "direct mapping" features from the plan's
    # JSON Schema Mapping table. Features requiring further design (oneOf,
    # allOf, not, if/then/else, patternProperties, etc.) are emitted as a
    # "# TODO: <keyword>" comment so the user can spot them.
    #
    # Note on the '*' sentinel: the plan writes unbounded sizes as `[0, *]`
    # but bare * is a YAML alias, so we emit `'*'` quoted in -size flow lists
    # while keeping plain `n-*` in succinct range scalars (where the whole
    # value is plain text the new parser owns).

    defn main(path='-'):
      text =:
        if path.eq('-'):
          slurp: System/in
          else:
            read: path
      data =: text:json/load
      convert: data

    defn convert(schema):
      defs =: or(schema.get('$defs') schema.get('definitions') {})
      has-defs =: not(empty?(defs))
      each [name sub] defs:
        emit-def: name sub
      when has-defs:
        say: ''
      emit-body: schema 0

    defn emit-def(name sub):
      scalar =: succinct-scalar(sub)
      if scalar:
        say: str('+' name ':\ ' scalar)
        do:
          say: str('+' name ':')
          emit-schema-block: sub 1

    defn emit-body(schema ind):
      emit-todos: schema ind
      if object-with-props?(schema):
        emit-properties: schema ind
        else:
          emit-schema-block: schema ind

    defn emit-properties(schema ind):
      props =: or(schema.get('properties') {})
      required =: or(schema.get('required') []):set
      pad =: indent-str(ind)
      each [name sub] props:
        is-required =: required.has?(name)
        emit-property: name sub is-required pad ind

    defn emit-property(name sub is-required pad ind):
      array? =: json-type(sub).eq('array').and(array-succinct?(sub))
      key =: key-for(name sub is-required array?)
      value-sub =: array?.if(array-item-schema(sub) sub)
      # When we strip the array wrapper via [] suffix, only emit the scalar if
      # the inner item schema itself is fully succinct.
      opt-key =: is-required.if('' '?')
      fallback-key =: str(name opt-key)
      scalar =: succinct-scalar(value-sub)
      cond:
        scalar:
          say: str(pad key ':\ ' scalar)
        object-with-props?(value-sub):
          do:
            say: str(pad fallback-key ':')
            emit-properties: value-sub inc(ind)
        else:
          do:
            say: str(pad fallback-key ':')
            emit-schema-block: sub inc(ind)

    # True when an array schema's only keys are {type, items, minItems, maxItems}
    # — i.e. the whole thing can be expressed as a [] key suffix + item value.
    defn array-succinct?(schema):
      allowed =: +['type' 'items' 'minItems' 'maxItems']:set
      ks =: key-set(schema)
      =>: every?(\(allowed.has?(_)) ks)

    # Emit a standalone schema block as an explicit directive map (fallback).
    defn emit-schema-block(schema ind):
      emit-todos: schema ind
      pad =: indent-str(ind)
      t =: json-type(schema)
      ts =: type-sym(t)
      has-type =: truey?(t).and(t.ne('array')).and(t.ne('object'))
      is-array =: t.eq('array')
      enum-v =: schema.get('enum' nil)
      const-v =: schema.get('const' nil)
      pattern =: schema.get('pattern' nil)
      ref =: schema.get('$ref' nil)
      default-v =: schema.get('default' nil)
      unique =: schema.get('uniqueItems' false)
      min-n =: schema.get('minimum' nil)
      max-n =: schema.get('maximum' nil)
      min-len =: schema.get('minLength' nil)
      max-len =: schema.get('maxLength' nil)
      min-items =: schema.get('minItems' nil)
      max-items =: schema.get('maxItems' nil)
      min-props =: schema.get('minProperties' nil)
      max-props =: schema.get('maxProperties' nil)
      when ref:
        say: str(pad '-type:\ ' ref-sym(ref))
      when has-type:
        say: str(pad '-type:\ ' ts)
      when is-array:
        say: str(pad '-list:\ true')
      when pattern:
        say: str(pad '-like:\ ' regex-literal(pattern))
      when enum-v:
        say: str(pad '-enum:\ ' enum-explicit(enum-v))
      when const-v:
        say: str(pad '-type:\ ' literal-value(const-v))
      when unique:
        say: str(pad '-uniq:\ true')
      when default-v:
        say: str(pad '-init:\ ' literal-value(default-v))
      when truey?(min-n).or(truey?(max-n)):
        say: str(pad '-size:\ ' size-pair(min-n max-n))
      when truey?(min-len).or(truey?(max-len)):
        say: str(pad '-size:\ ' size-pair(min-len max-len))
      when truey?(min-items).or(truey?(max-items)):
        say: str(pad '-size:\ ' size-pair(min-items max-items))
      when truey?(min-props).or(truey?(max-props)):
        say: str(pad '-size:\ ' size-pair(min-props max-props))
      when is-array.and(truey?(schema.get('items' nil))):
        items =: schema.get('items')
        item-scalar =: succinct-scalar(items)
        if item-scalar:
          say: str(pad '-type:\ ' item-scalar)
          do:
            say: str(pad '-item:')
            emit-schema-block: items inc(ind)
      when t.eq('object').and(object-with-props?(schema)):
        emit-properties: schema ind

    # Emit "# TODO: <keyword>" comments for features we don't handle yet.
    defn emit-todos(schema ind):
      pad =: indent-str(ind)
      todos =: qw(allOf anyOf oneOf not if then else dependentRequired
                  dependentSchemas patternProperties propertyNames
                  prefixItems contains additionalProperties
                  unevaluatedItems unevaluatedProperties
                  exclusiveMinimum exclusiveMaximum format)
      each k todos:
        when schema.has?(k):
          say: str(pad '# TODO:\ ' k)

    # Return the succinct scalar form of a schema, or nil if it cannot be
    # expressed as a single scalar (e.g. has multiple constraint dimensions).
    defn succinct-scalar(schema):
      cond:
        not(map?(schema)):
          nil
        schema.has?('$ref'):
          only-ref?(schema).if(ref-sym(schema.get('$ref')) nil)
        schema.has?('const'):
          only-const?(schema).if(literal-value(schema.get('const')) nil)
        schema.has?('enum'):
          only-enum?(schema).if(enum-pipe(schema.get('enum')) nil)
        schema.has?('pattern'):
          pattern-only?(schema).if(regex-literal(schema.get('pattern')) nil)
        numeric-range-only?(schema):
          range-scalar(schema)
        type-only?(schema):
          type-sym(schema.get('type'))
        else: nil

    defn key-set(schema):
      schema:keys:vec:set

    defn only-ref?(schema):
      ref-ks =: +['$ref']:set
      =>: key-set(schema).eq(ref-ks)

    defn only-const?(schema):
      const-ks =: +['const']:set
      =>: key-set(schema).eq(const-ks)

    defn only-enum?(schema):
      enum-ks =: +['enum']:set
      =>: key-set(schema).eq(enum-ks)

    defn pattern-only?(schema):
      ks =: key-set(schema)
      pat-ks =: +['pattern']:set
      pat-type-ks =: +['pattern' 'type']:set
      just-pat =: ks.eq(pat-ks)
      pat-and-str =:
        and:
          ks.eq(pat-type-ks)
          schema.get('type').eq('string')
      =>: just-pat.or(pat-and-str)

    defn type-only?(schema):
      type-ks =: +['type']:set
      =>: key-set(schema).eq(type-ks)

    defn numeric-range-only?(schema):
      ks =: key-set(schema)
      t =: schema.get('type')
      allowed =: +['type' 'minimum' 'maximum']:set
      has-any-bound =: ks.has?('minimum').or(ks.has?('maximum'))
      is-num =: t.eq('integer').or(t.eq('number'))
      all-allowed =: every?(\(allowed.has?(_)) ks)
      =>: all-allowed.and(is-num).and(has-any-bound)

    defn object-with-props?(schema):
      map?(schema).and(schema.has?('properties'))

    defn array-item-schema(schema):
      or(schema.get('items') {})

    # Build the key portion for a property line including succinct suffixes.
    defn key-for(name sub is-required array?):
      suffix =: array?.if(list-suffix(sub) '')
      opt =: is-required.if('' '?')
      str: name opt suffix

    defn list-suffix(sub):
      mn =: sub.get('minItems' nil)
      mx =: sub.get('maxItems' nil)
      cond:
        nil?(mn).and(nil?(mx)):
          '[]'
        truey?(mn).and(mn.eq(mx)):
          str('[' mn ']')
        nil?(mn).and(truey?(mx)):
          str('[0-' mx ']')
        truey?(mn).and(nil?(mx)):
          mn.eq(1).if('[+]' str('[' mn '+]'))
        else:
          str('[' mn '-' mx ']')

    defn json-type(schema):
      t =: schema.get('type' nil)
      =>: vector?(t).if(first(t) t)

    defn type-sym(t):
      cond:
        nil?(t): '+Any'
        t.eq('string'): '+Str'
        t.eq('integer'): '+Int'
        t.eq('number'): '+Float'
        t.eq('boolean'): '+Bool'
        t.eq('null'): '+Null'
        t.eq('object'): '+Map'
        t.eq('array'): '+Any'
        else: '+Any'

    defn ref-sym(ref):
      last-seg =: ref.split('/'):last
      =>: str('+' last-seg)

    defn range-scalar(schema):
      lo =: schema.get('minimum' nil)
      hi =: schema.get('maximum' nil)
      lo-s =: nil?(lo).if('*' str(lo))
      hi-s =: nil?(hi).if('*' str(hi))
      =>: str(lo-s '-' hi-s)

    # Format a -size directive value as a flow list. Unbounded sides emit
    # '*' quoted because bare * is a YAML alias.
    defn size-pair(lo hi):
      lo-s =: nil?(lo).if("'*'" str(lo))
      hi-s =: nil?(hi).if("'*'" str(hi))
      =>: str('[' lo-s ', ' hi-s ']')

    # Wrap a raw pattern string as /pattern/, escaping inner slashes.
    defn regex-literal(pattern):
      esc =: pattern.replace('/' '\\/')
      =>: str('/' esc '/')

    defn safe-pipe-token?(v):
      and:
        string?(v)
        re-matches(/^[A-Za-z0-9_][A-Za-z0-9_-]*$/ v)

    # Return "a|b|c" if every enum value is a safe plain token; else nil.
    defn enum-pipe(values):
      values.every?(safe-pipe-token?).if(values.join('|') nil)

    # Fallback explicit flow list for an enum directive.
    defn enum-explicit(values):
      parts =: values.map(literal-value)
      =>: str('[' parts.join(', ') ']')

    defn literal-value(v):
      cond:
        string?(v): str("'" v "'")
        nil?(v): 'null'
        else: str(v)

    defn indent-str(n):
      apply: str repeat(n '  ')
