    !ys-0

    # json2ys - Convert JSON Schema to YAML Schema (succinct DSL).
    #
    # Reads a JSON Schema document from stdin (when the arg is "-" or omitted)
    # or from a file path, and prints the equivalent YAML Schema in the
    # succinct DSL form described in yaml-schema-language-plan.md.
    #
    # Feature scope (v1): the 15 "direct mapping" features from the plan's
    # JSON Schema Mapping table. Features requiring further design (oneOf,
    # allOf, not, if/then/else, patternProperties, etc.) are emitted as a
    # "# TODO: <keyword>" comment so the user can spot them.
    #
    # Note on the '*' sentinel: the plan writes unbounded sizes as `[0, *]`
    # but bare * is a YAML alias, so we emit `'*'` quoted in -size flow lists
    # while keeping plain `n-*` in succinct range scalars (where the whole
    # value is plain text the new parser owns).

    defn main(path='-'):
      text =:
        if path == '-':
          read: IN
          else:
            read: path
      data =: text:json/load
      convert: data

    defn convert(schema):
      defs =: schema.'$defs' ||
              schema.definitions ||
              {}
      has-defs =: empty?(defs):not
      each [name sub] defs:
        emit-def: name sub
      when has-defs:
        say: ''
      emit-body: schema 0

    defn emit-def(name sub):
      scalar =: succinct-scalar(sub)
      if scalar:
        say: "+$name: $scalar"
        else:
          say: "+$name:"
          emit-schema-block: sub 1

    defn emit-body(schema ind):
      emit-todos: schema ind
      if object-with-props?(schema):
        emit-properties: schema ind
        else:
          emit-schema-block: schema ind

    defn emit-properties(schema ind):
      props =: schema.properties
      required =: set(schema.required)
      pad =: indent-str(ind)
      each [name sub] props:
        is-required =: required.has?(name)
        emit-property: name sub is-required pad ind

    defn emit-property(name sub is-required pad ind):
      array? =: json-type(sub).eq('array').and(array-succinct?(sub))
      key =: key-for(name sub is-required array?)
      value-sub =: array?.if(array-item-schema(sub) sub)
      # When we strip the array wrapper via [] suffix, only emit the scalar if
      # the inner item schema itself is fully succinct.
      opt-key =: is-required.if('' '?')
      fallback-key =: name + opt-key
      scalar =: succinct-scalar(value-sub)
      cond:
        scalar:
          say: pad + key + ':\ ' + scalar
        object-with-props?(value-sub):
          do:
            say: "$pad$fallback-key:"
            emit-properties: value-sub ind.++
        else:
          do:
            say: "$pad$fallback-key:"
            emit-schema-block: sub ind.++

    # True when an array schema's only keys are {type, items, minItems, maxItems}
    # — i.e. the whole thing can be expressed as a [] key suffix + item value.
    defn array-succinct?(schema):
      every? \(_.in?(qw(type items minItems maxItems))):
        key-set(schema)

    # Emit a standalone schema block as an explicit directive map (fallback).
    defn emit-schema-block(schema ind):
      emit-todos: schema ind
      pad =: indent-str(ind)
      t =: json-type(schema)
      ts =: type-sym(t)
      has-type =: t.? && (t != 'array') && (t != 'object')
      is-array =: t.eq('array')
      min-n max-n =: schema.minimum schema.maximum
      min-len max-len =: schema.minLength schema.maxLength
      min-items max-items =: schema.minItems schema.maxItems
      min-props max-props =: schema.minProperties schema.maxProperties
      when+ schema.'$ref':
        say: "-type: $(ref-sym(_))"
      when has-type:
        say: "${pad}-type: $ts"
      when is-array:
        say: "${pad}-list: true"
      when+ schema.pattern:
        say: "${pad}-like: $(regex-literal(_))"
      when+ schema.enum:
        say: "${pad}-enum: $(enum-explicit(_))"
      when schema.const:
        say: "${pad}-type: $(literal-value(_))"
      when schema.uniqueItems:
        say: "${pad}-uniq: true"
      when+ schema.default:
        say: "${pad}-init: $(literal-value(_))"
      when min-n.? || max-n.?:
        say: "${pad}-size: $(size-pair(min-n max-n))"
      when min-len.? || max-len.?:
        say: "${pad}-size: $(size-pair(min-len max-len))"
      when min-items.? || max-items.?:
        say: "${pad}-size: $(size-pair(min-items max-items))"
      when min-props.? || max-props.?:
        say: "${pad}-size: $(size-pair(min-props max-props))"
      when is-array && schema.items.?:
        items =: schema.items
        item-scalar =: succinct-scalar(items)
        if item-scalar:
          say: "${pad}-type: $item-scalar"
          else:
            say: "${pad}-item:"
            emit-schema-block: items ind.++
      when (t == 'object') && object-with-props?(schema):
        emit-properties: schema ind

    # Emit "# TODO: <keyword>" comments for features we don't handle yet.
    defn emit-todos(schema ind):
      pad =: indent-str(ind)
      todos =: qw(allOf anyOf oneOf not if then else dependentRequired
                  dependentSchemas patternProperties propertyNames
                  prefixItems contains additionalProperties
                  unevaluatedItems unevaluatedProperties
                  exclusiveMinimum exclusiveMaximum format)
      each k todos:
        when schema.has?(k):
          say: "$pad# TODO: $k"

    # Return the succinct scalar form of a schema, or nil if it cannot be
    # expressed as a single scalar (e.g. has multiple constraint dimensions).
    defn succinct-scalar(schema):
      cond:
        not(map?(schema)):
          nil
        schema.has?('$ref'):
          only-ref?(schema).when(ref-sym(schema.'$ref'))
        schema.has?('const'):
          only-const?(schema).when(literal-value(schema.const))
        schema.has?('enum'):
          only-enum?(schema).when(enum-pipe(schema.enum))
        schema.has?('pattern'):
          pattern-only?(schema).when(regex-literal(schema.pattern))
        numeric-range-only?(schema):
          range-scalar(schema)
        type-only?(schema):
          type-sym(schema.type)

    defn key-set(schema):
      schema:keys:vec:set

    defn only-ref?(schema):
      ref-ks =: set(['$ref'])
      key-set(schema) ==: ref-ks

    defn only-const?(schema):
      const-ks =: +['const']:set
      key-set(schema) ==: const-ks

    defn only-enum?(schema):
      enum-ks =: +['enum']:set
      key-set(schema) ==: enum-ks

    defn pattern-only?(schema):
      ks =: key-set(schema)
      pat-ks =: set(qw(pattern))
      pat-type-ks =: set(qw(pattern type))
      just-pat =: ks == pat-ks
      pat-and-str =:
        and:
          ks.eq(pat-type-ks)
          schema.type.eq('string')
      just-pat ||: pat-and-str

    defn type-only?(schema):
      type-ks =: +['type']:set
      eq: key-set(schema) type-ks

    defn numeric-range-only?(schema):
      ks =: key-set(schema)
      t =: schema.type
      allowed =: set(qw(type minimum maximum))
      has-any-bound =: ks.has?('minimum') || ks.has?('maximum')
      is-num =: t.eq('integer') || t.eq('number')
      all-allowed =: ks.every?(\(allowed.has?(_)))
      and: all-allowed is-num has-any-bound

    defn object-with-props?(schema):
      map?(schema).and(schema.has?('properties'))

    defn array-item-schema(schema):
      schema.items || {}

    # Build the key portion for a property line including succinct suffixes.
    defn key-for(name sub is-required array?):
      suffix =: array?.if(list-suffix(sub) '')
      opt =: is-required.if('' '?')
      str: name opt suffix

    defn list-suffix(sub):
      mn =: sub.minItems
      mx =: sub.maxItems
      cond:
        mn:nil? && mx:nil?:
          '[]'
        mn == mx: "[$mn]"
        mn:nil? && mx.?: "[0-$mx]"
        mn.? && mx:nil?:
          if mn == 1:
            then: '[+]'
            else: "[${mn}+]"
        else: "[${mn}-$mx]"

    defn json-type(schema):
      t =: schema.type
      if vector?(t): first(t) t

    defn type-sym(t):
      cond:
        t:nil?: '+Any'
        t == 'string': '+Str'
        t == 'integer': '+Int'
        t == 'number': '+Float'
        t == 'boolean': '+Bool'
        t == 'null': '+Null'
        t == 'object': '+Map'
        t == 'array': '+Any'
        else: '+Any'

    defn ref-sym(ref):
      last-seg =: ref.split('/'):last
      =>: "+$last-seg"

    defn range-scalar(schema):
      lo =: schema.minimum
      hi =: schema.maximum
      lo-s =: nil?(lo).if('*' lo)
      hi-s =: nil?(hi).if('*' hi)
      =>: "${lo-s}-${hi-s}"

    # Format a -size directive value as a flow list. Unbounded sides emit
    # '*' quoted because bare * is a YAML alias.
    defn size-pair(lo hi):
      lo-s =: nil?(lo).if("'*'" lo)
      hi-s =: nil?(hi).if("'*'" hi)
      =>: "[$lo-s, $hi-s]"

    # Wrap a raw pattern string as /pattern/, escaping inner slashes.
    defn regex-literal(pattern):
      esc =: pattern.replace('/' '\\/')
      =>: "/$esc/"

    defn safe-pipe-token?(v):
      v =~ /^[A-Za-z0-9_][A-Za-z0-9_-]*$/

    # Return "a|b|c" if every enum value is a safe plain token; else nil.
    defn enum-pipe(values):
      when values.every?(safe-pipe-token?): values.join('|')

    # Fallback explicit flow list for an enum directive.
    defn enum-explicit(values):
      parts =: values.map(literal-value)
      =>: "[$(parts.join(', '))]"

    defn literal-value(v):
      cond:
        string?(v): "'$v'"
        nil?(v): 'null'
        else: v

    defn indent-str(n): n * '  '
  notes: |
    Lessons extracted from this correction. New rules added to
    SKILL.md in the same educate run; reinforced rules were already
    present.

    NEW:
    - `when+` binds `_` to the truey value of an expression — replaces
      the test-then-fetch pattern. Example:
      `when+ schema.'$ref': say: "-type: $(ref-sym(_))"`
    - `.when(value)` returns `value` if the receiver is truey, else
      nil. Replaces the `.if(value nil)` idiom:
      `only-ref?(s).when(ref-sym(s.'$ref'))`
    - `cond` returns nil implicitly when no clause matches — drop the
      trailing `else: nil` arm.
    - Integer-times-string repeats: `n * '  '` for an indent of `n`
      levels. Replaces `apply: str repeat(n '  ')`.
    - Quoted property lookup `obj.'key'` for keys that aren't valid
      bare identifiers (start with `$`, etc.):
      `schema.'$ref'`, `schema.'$defs'` instead of `schema.get('$ref')`.
    - `IN` constant — stdin handle for `read`: `read: IN` instead of
      `slurp: System/in`.
    - String interpolation auto-stringifies: `"$v"` and `"$(expr)"`
      work for any value, no `str(v)` needed inside the interpolation.

    REINFORCED (already in SKILL.md, repeated here as evidence):
    - Symbolic operators (`==`, `!=`, `&&`, `||`) over named ones
      (`.eq`, `.ne`, `.and`, `.or`) for inline comparisons.
    - Property access (`schema.minimum`) over `.get('minimum' nil)`.
    - `qw(...)` and `set(qw(...))` over `+['x' 'y' 'z']:set`.
    - `read` and `write` over `slurp` and `spit`.
    - Postfix operators `.++`, `.?`, `.!` over function-call form.
    - Colon-chain `:not` and `:nil?` over `not(...)` and `nil?(...)`.
    - Block-form `if cond: then else` over scalar `cond.if(...)`.
