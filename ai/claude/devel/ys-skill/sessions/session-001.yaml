- id: session-001-L
  level: 2
  description: ->> threading chain into reduce
  clojure: |
    (->> [1 2 3 4 5]
         (filter even?)
         (map #(* % 2))
         (reduce +))
  yamlscript: |
    !ys-0
    =>: [1 2 3 4 5].filter(even?).map(\(_ * 2)).reduce(+)
  correct: false
  notes: |
    `[...]` at start of a YS expression is invalid YAML — prefix with
    `+` to use a vector literal: `+[1 2 3 4 5].filter(...)`.
    `reduce(+)` works with no initial value in dot chain form.
  reply: |
    Your solution was invalid YAML which you could have found out by testing
    it. You also could have tested your expected result as shown below.
    $ ys -ce '[1 2 3 4 5].filter(even?).map(\(_ * 2)).reduce(+)'
    Compile error: expected '<document start>', but found '<scalar>'
     in reader, line 2, column 12:
        [1 2 3 4 5].filter(even?).map(\(_ * 2)).red ... 
                   ^
    
    $ ys -ce '+[1 2 3 4 5].filter(even?).map(\(_ * 2)).reduce(+)'
    (+reduce (+map (+filter [1 2 3 4 5] even?) (fn [& [_1]] (mul+ _1 2))) +)
    $ ys -pe '+[1 2 3 4 5].filter(even?).map(\(_ * 2)).reduce(+)'
    12
- id: session-001-M
  level: 2
  description: map literal with keyword keys
  clojure: |
    {:name "Alice" :age 30}
  yamlscript: |
    !ys-0
    =>: {name: Alice age: 30}
  correct: |
    $ ys -pe '=>: {name: Alice age: 30}'
    Compile error: while parsing a flow mapping
     in reader, line 2, column 5:
        =>: {name: Alice age: 30}
            ^
    expected ',' or '}', but got :
     in reader, line 2, column 21:
        =>: {name: Alice age: 30}
                            ^
    
    $ ys -pe '=>: +{name: Alice age: 30}'
    Compile error: mapping values are not allowed here
     in reader, line 2, column 11:
        =>: +{name: Alice age: 30}
                  ^
    
    $ ys -pe '=>: +{:name Alice, :age 30}'
    Error: Could not resolve symbol: Alice
    $ ys -pe '=>: +{:name "Alice", :age 30}'
    {:name "Alice", :age 30}
  notes: |
    Keyword keys need `:` prefix, flow maps need commas, string values
    need quotes, and `+` prefix needed: `+{:name "Alice", :age 30}`.

- id: session-001-N
  level: 1
  description: do block
  clojure: |
    (do
      (println "hello")
      (println "world")
      42)
  yamlscript: |
    !ys-0
    do:
      say: hello
      say: world
      =>: 42
  correct: |
    !ys-0
    say: 'hello'
    say: 'world'
    =>: 42
  notes: |
    Top-level, `defn`, `fn` and many other contexts have implicit `do`
    semantics. Explicit `do:` is rarely needed — avoid it unless testing
    shows it makes a difference.
