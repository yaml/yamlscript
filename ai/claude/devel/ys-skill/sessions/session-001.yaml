- id: session-001-I
  level: 2
  description: loop/recur
  clojure: |
    (loop [i 1 acc 0]
      (if (> i 5)
        acc
        (recur (inc i) (+ acc i))))
  yamlscript: |
    !ys-0
    loop i 1, acc 0:
      if i > 5:
        acc
        recur i.++: acc + i
  correct:
  - |
    !ys-0
    loop i 1, acc 0:
      if i > 5:
        then: acc
        else:
          recur i.++: acc + i
  - |
    !ys-0
    loop i 1, acc 0:
      if i <= 5:
        recur: i.++ (acc + i)
        else: acc
  notes: |
    My attempt was invalid — `if` body needs explicit `then:`/`else:` or
    two clear forms; mixing bare scalar (`acc`) and a pair (`recur ...`)
    in the same block was ambiguous. Always check with:
      ys -c - <<<'!ys-0 ...'
    `recur` with multiple args: `recur: arg1 arg2` (space-separated inline)
    or `recur arg1: arg2` (pair form) when arg2 is a nested expression.
  reply: |
    Your attempt was invalid YAMLScript. You should really be checking your
    attempts with something like this:
      ys -c - <<<'
      !ys-0
      loop i 1, acc 0:
        if i > 5:
          then: acc
          else:
            recur i.++: acc + i'

