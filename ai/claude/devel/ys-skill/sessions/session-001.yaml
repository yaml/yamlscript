# Teaching session: session-001
# Format: Clojure snippet → my YS attempt → Ingy's correct/confirmation

- id: session-001-A
  level: 2
  description: filter+map pipeline with dot chaining
  clojure: |
    (->> (range 1 11)
         (filter odd?)
         (map #(* % %)))
  yamlscript: |
    !ys-0
    =>: (1 .. 10).filter(odd?).map(fn(x): x * x)
  correct:
  - |
    !ys-0
    (1 .. 10).filter(odd?).map(\(_ * _))
  - |
    !ys-0
    rng(1 10).filter(odd?).map(fn([x] (x * x)))
  notes: |
    `fn(x): body` is block-only — inline YAML splits on `: ` making
    `.map(fn(x): x * x)` into key `.map(fn(x)` and val `x * x)`.
    Use `\(_ * _)` or `fn([x] expr)` for inline lambdas.

- id: session-001-B
  level: 1
  description: defn with default argument
  clojure: |
    (defn greet
      ([name] (println (str "Hello, " name "!")))
      ([] (greet "World")))
  yamlscript: |
    !ys-0
    defn greet(name='World'):
      say: "Hello, $name!"
  also: |
    !ys-0
    defn greet:
      (name): say("Hello. $name!")
      (): greet('World')

- id: session-001-C
  level: 1
  description: if/else block form
  clojure: |
    (if (> x 0)
      (println "positive")
      (println "non-positive"))
  yamlscript: |
    !ys-0
    if x > 0:
      say: positive
    else:
      say: non-positive
  correct:
  - |
    !ys-0
    if x > 0:
      say: positive
      say: non-positive
  - |
    !ys-0
    if x > 0:
      then:
        say: positive
      else:
        say: non-positive
  - |
    !ys-0
    if x > 0:
      say: positive
      else:
        say: non-positive
  notes: |
    `if` always takes two forms (then + else). Use `when` for no-else.
    All three corrects are equivalent. `else:` must be inside the if
    block, not a sibling. YS code blocks are ASTs — duplicate keys valid.
    `then:`/`else:` useful when bodies have multiple forms:
      if a > b:
        then:
          c =: 5
          c *: 3
        else: d

- id: session-001-D
  level: 2
  description: cond block form
  clojure: |
    (cond
      (< x 0) "negative"
      (= x 0) "zero"
      :else   "positive")
  yamlscript: |
    !ys-0
    cond:
      (x < 0) : negative
      (x == 0): zero
      else    : positive
  also:
  - |
    !ys-0
    cond:
      x < 0  : negative
      x == 0 : zero
      else   : positive
  - |
    !ys-0
    cond:
      x.lt(0): negative
      x.eq(0): zero
      else   : positive

- id: session-001-E
  level: 2
  description: let binding
  clojure: |
    (let [x 6
          y 7]
      (* x y))
  yamlscript: |
    !ys-0
    let x 6, y 7:
      =>: x * y
  correct:
  - |
    !ys-0
    x =: 6
    y =: 7
    =>: x * y
  - |
    !ys-0
    x y =: 6 7
    x *: y
  notes: |
    YS has no `let` form — use sequential `=:` assignments instead.
  reply: |
    Use `=>:` when you're in a situation where a pair is required
    (to be valid YAML) but you only have a scalar.

- id: session-001-F
  level: 1
  description: when (one-armed conditional)
  clojure: |
    (when (> x 0)
      (println "positive"))
  yamlscript: |
    !ys-0
    when x > 0:
      say: positive
  correct: true
  reply: |
    One thing to note about the when function is that its body can consist of
    multiple forms.

- id: session-001-G
  level: 1
  description: for comprehension
  clojure: |
    (for [x (range 1 6)] (* x x))
  yamlscript: |
    !ys-0
    for x (1 .. 5):
      =>: x * x
  also:
  - |
    !ys-0
    for x (1 .. 5): x * x
  - |
    !ys-0
    for x (1 .. 5):
      x * x
  - |
    !ys-0
    for x (1 .. 5):
      x *: x
  notes: |
    `=>:` works but is unnecessary — bare scalar body is fine.

