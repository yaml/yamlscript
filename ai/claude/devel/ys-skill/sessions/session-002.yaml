- id: session-002-A
  level: 2
  prompt: |
    Write a palindrome checker that ignores case and non-alphanumeric
    characters
  clojure: |
    (defn palindrome? [s]
      (let [clean (-> s
                      clojure.string/lower-case
                      (clojure.string/replace #"[^a-z0-9]" ""))
            rev (apply str (reverse clean))]
        (= clean rev)))
  yamlscript: |
    !ys-0
    defn palindrome?(s):
      clean =: s.lc().replace(/[^a-z0-9]/ '')
      rev =: join('' clean.reverse())
      =>: clean == rev
  also:
  - |
    !ys-0
    defn palindrome?(s):
      clean =: s:lc.replace(/[^a-z0-9]/ '')
      rev =: clean:reverse:join  # join defaults to ''
      clean ==: rev
  - |
    # This version can be run as a program with arguments
    # because it has a main function. 
    !ys-0
    defn main(s):
      say: "'$s' is a palindrome: $(s:palindrome?)"

    defn palindrome?(s):
      clean =: s:lc.replace(/[^a-z0-9]/ '')
      rev =: clean:reverse:join  # join defaults to ''
      clean ==: rev
  notes: |
    Two bugs caught by testing before submission:
    1. Bare `clean == rev` at end of defn body needs `=>:` — YAML
       tries to parse it as a key without a value.
    2. `clean.reverse().join('')` compiles to `(join (reverse clean) "")`
       but `join` takes sep first. Use `join('' clean.reverse())` instead.
    New patterns from also:
    - `s:lc` — colon call syntax for zero-arg calls, no parens needed
    - `clean:reverse:join` — colon chaining; `join` defaults to `''`
    - `clean ==: rev` — operator pair form, cleaner than `=>: clean == rev`
    - `s:palindrome?` — colon syntax works inside string interpolation

- id: session-002-B
  level: 2
  prompt: |
    Write a program that takes a text string as input and prints each
    unique word with its frequency, sorted from most to least frequent
  clojure: |
    (defn -main [& [text]]
      (let [text (or text "the cat sat on the mat the cat")
            pairs (->> (clojure.string/split (clojure.string/lower-case text) #"\s+")
                       frequencies
                       (sort-by val >))]
        (doseq [[word freq] pairs]
          (println (str freq " " word)))))
  yamlscript: |
    !ys-0
    defn main(text='the cat sat on the mat the cat'):
      pairs =: text.lc().split(/\s+/).frequencies().sort-by(val).reverse()
      each [word freq] pairs:
        say: "$freq $word"
  better: |
    !ys-0
    defn main(text='the cat sat on the mat the cat'):
      pairs =: text:lc
                 .split(/\s+/):frequencies
                 .sort-by(val):reverse
      each [word freq] pairs:
        say: "$freq $word"
  notes: |
    Collection arg must be bound to a variable before `each` destructuring —
    can't inline a multi-line pipeline directly after `each [word freq]`.
    `sort-by(val).reverse()` for descending sort by value.
    Split long pipelines before `.call(` for readability — but not before
    `:call` (colon calls can't be split from their receiver).
    Continuation lines indent to align under the first `.`.
    General rule: aim for lines under 50 chars. Neither always-chaining
    nor always-block-form — both drift ugly. Assign intermediate results
    to variables when it aids clarity.
  reply: |
    Split long lines to make them more readable. You can split before any
    `.call(`, but you can't split before `:call`. You can also split almost
    anywhere that white space is allowed. 

- id: session-002-C
  level: 2
  prompt: |
    Write a program that takes numbers as CLI arguments and prints basic
    statistics: count, sum, min, max, and mean
  clojure: |
    (defn -main [& nums]
      (let [nums (map #(Double/parseDouble %) nums)
            n (count nums)
            total (reduce + nums)]
        (println (str "count: " n))
        (println (str "sum:   " total))
        (println (str "min:   " (apply min nums)))
        (println (str "max:   " (apply max nums)))
        (println (str "mean:  " (/ total n)))))
  yamlscript: |
    !ys-0
    defn main(*nums):
      nums =: nums.map(num)
      n =: nums.count()
      total =: nums.sum()
      say: "count: $n"
      say: "sum:   $total"
      say: "min:   $(nums.apply(min))"
      say: "max:   $(nums.apply(max))"
      say: "mean:  $(total / n)"
  better: |
    !ys-0
    defn main(*nums):
      nums .=: map(num)
      n =: nums:count
      total =: nums:sum
      say: |
        count: $n
        sum:   $total
        min:   $(min(nums*))
        max:   $(max(nums*))
        mean:  $(total / n)
  notes: |
    `*nums` for variadic args in `main`.
    `num()` converts strings to numbers.
    `min(nums*)` — splat spreads collection as variadic args to `min`;
    `x.(f*)` is shorthand for `x.apply(f)`.
    `nums .=: map(num)` — augmented dot assignment; `a .=: f(b)` means
    `a =: a.f(b)`. Works for other operators too: `*=:`, `+=:`, `||=:`.
    `say: |` with a multi-line literal block — all lines get interpolated
    and printed together with one `say`.
    Prefer `a:b:c` colon chaining for zero-arg calls over `a.b().c()`.
    Can't pipe stdin with args via `ys - - arg1 arg2` — use a file.
  reply: |
    Interpolation in YAML literals, scalers is a really awesome feature of
    YAMLScript. 
    `x.(y*)` is short for `x.apply(y)`
    You keep forgetting to turn `a.b().c()` into `a:b:c`.
    `a =: a <op> b` can be `a <op>=: b` for operators like . * + || etc

- id: session-002-D
  level: 2
  prompt: |
    Write a run-length encoder that compresses consecutive repeated
    characters, e.g. "aaabbbcc" becomes "3a3b2c"
  clojure: |
    (defn encode [s]
      (apply str
        (map (fn [[m c]] (str (count m) c))
             (re-seq #"(.)\1*" s))))

    (defn -main [& [s]]
      (println (encode (or s "aaabbbccddddee"))))
  yamlscript: |
    !ys-0
    defn main(s='aaabbbccddddee'):
      say: encode(s)

    defn encode(s):
      s.re-seq(/(.)\1*/)
       .map(fn([[m c]] str(m:count c)))
       .join('')
  also: |
    !ys-0
    defn encode(s):
      s.re-seq(/(.)\1*/)
       .map(\(_.0.#:S + _.1))
       .join('')
  notes: |
    `partition-by(identity)` failed on strings — used regex `(.)\1*`
    instead to group consecutive identical characters.
    `re-seq` returns `[full-match group1 ...]` per match — destructure
    with `fn([[m c]] ...)` to get full match and capture group.
    `m:count` gives length of the matched run.
    From also: `_.0` and `_.1` index into the lambda's implicit arg `_`.
    `.#` is the count/length operator (shorthand for `:count`).
    `:S` converts a value to string.
    So `_.0.#:S + _.1` = stringify the run length + the captured char.

- id: session-002-E
  level: 1
  prompt: |
    Write a program that prints a multiplication table up to N×N,
    with columns separated by tabs. N defaults to 5.
  clojure: |
    (defn -main [& [n]]
      (let [n (Integer/parseInt (or n "5"))]
        (doseq [i (range 1 (inc n))]
          (println (clojure.string/join "\t"
                     (map #(* i %) (range 1 (inc n))))))))
  yamlscript: |
    !ys-0
    defn main(n=5):
      n =: num(n)
      each i (1 .. n):
        say: (1 .. n).map(\(i * _)).join("\t")
  also: |
    !ys-0
    defn main(n=5):
      each i (1 .. n): !say
        (1 .. n):
          .map(\(i * _))
          .join(\\tab)
  notes: |
    `\(i * _)` captures `i` from the outer scope — lambdas close over
    surrounding bindings as expected.
    From also: `!say` introduced here as a teaching example. `!<fn>` on
    a parent line avoids an extra indent level — most useful when the
    body is already deeply nested. Not essential at shallow indentation.
    `(1 .. n):` starts a multi-line dot chain — continuation lines
    begin with `.method(...)`.
    `\\tab` in a block scalar becomes `\tab` — the tab character literal.
    YS auto-converts CLI args that look like numbers, so `n =: num(n)`
    is unnecessary when the default is already numeric.

- id: session-002-F
  level: 2
  prompt: |
    Write an anagram checker that takes two strings as CLI arguments
    and prints true or false. Ignore case and whitespace.
  clojure: |
    (defn -main [& [s1 s2]]
      (println (= (frequencies (clojure.string/replace
                                 (clojure.string/lower-case (or s1 "listen"))
                                 #"\s+" ""))
                  (frequencies (clojure.string/replace
                                 (clojure.string/lower-case (or s2 "silent"))
                                 #"\s+" "")))))
  yamlscript: |
    !ys-0
    defn main(s1='listen' s2='silent'):
      say: anagram?(s1 s2)

    defn anagram?(s1 s2):
      s1:clean:frequencies ==: s2:clean:frequencies

    defn- clean(s):
      s:lc.replace(/\s+/ '')
  also: |
    !ys-0
    defn main(s1='listen' s2='silent'):
      say: s1.anagram?(s2)

    defn anagram?(s1 s2):
      eq:
        s1:clean:frequencies
        s2:clean:frequencies

    defn- clean(s):
      s:lc.replace(/\s+/)
  notes: |
    Colon syntax for zero-arg calls: `s1:clean:frequencies`.
    Dot syntax for calls with additional args: `s1.anagram?(s2)`.
    Both work for user-defined functions — the distinction is arity,
    not built-in vs user-defined.
    `eq:` as a block form takes two indented args — alternative to `==:`.
    `replace(/\s+/)` with no second arg defaults to replacing with `''`.

- id: session-002-G
  level: 1
  prompt: |
    Write a FizzBuzz program: for numbers 1 to N (default 20), print
    Fizz for multiples of 3, Buzz for multiples of 5, FizzBuzz for
    multiples of both, otherwise the number.
  clojure: |
    (defn fizzbuzz [i]
      (cond
        (zero? (mod i 15)) "FizzBuzz"
        (zero? (mod i 3))  "Fizz"
        (zero? (mod i 5))  "Buzz"
        :else              i))

    (defn -main [& [n]]
      (let [n (Integer/parseInt (or n "20"))]
        (doseq [i (range 1 (inc n))]
          (println (fizzbuzz i)))))
  yamlscript: |
    !ys-0
    defn main(n=20):
      each i (1 .. n):
        say: fizzbuzz(i)

    defn fizzbuzz(i):
      cond:
        (i % 15).!: 'FizzBuzz'
        (i % 3).!: 'Fizz'
        (i % 5).!: 'Buzz'
        else: i
  also: |
    !ys-0
    defn main(n=20):
      each i (1 .. n):
        say: fizzbuzz(i)

    defn fizzbuzz(i):
      cond:
        zero?(i % 15): 'FizzBuzz'
        (i % 3) == 0 : 'Fizz'
        (i % 5).eq(0): 'Buzz'
        else: i
  notes: |
    `%` for modulo — prefer over `mod` or `rem`.
    `.!` is the falsey-check operator: `(i % 15).!` is true when the
    remainder is zero (falsey). Replaces `(zero? (mod i 15))`.
    String values like 'Fizz' need quoting — unquoted bare words are
    resolved as symbols.
    From also: three equivalent ways to test for zero —
    `zero?(expr)`, `expr == 0`, `expr.eq(0)`. All valid; `.!` is the
    most idiomatic YS form for zero-check on a mod result.

- id: session-002-H
  level: 2
  prompt: |
    Write a program that prints the first N Fibonacci numbers
    (default 10) on one line separated by spaces.
  clojure: |
    (declare fib)

    (defn -main [& [n]]
      (let [n (Integer/parseInt (or n "10"))]
        (println (clojure.string/join " " (map fib (range n))))))

    (defn fib [n]
      (if (< n 2)
        n
        (+ (fib (- n 1)) (fib (- n 2)))))
  yamlscript: |
    !ys-0
    defn main(n=10):
      say: (0 .. (n - 1)).map(fib).join(' ')  #'

    defn fib(n):
      if n < 2:
        then: n
        else: fib(n - 1) + fib(n - 2)
  also: |
    !ys-0
    defn main(n=10):
      say: (1 .. n)
            .map(dec * fib):joins
    
    defn fib(n):
      if n > 1:
        add: n.--:fib
             n.--.--:fib
        else: n
  notes: |
    `n-1` parses as a symbol — always put spaces around arithmetic
    operators: `n - 1` not `n-1`.
    Range bounds with arithmetic need parentheses: `0 .. (n - 1)`.
    Named functions pass directly to higher-order functions:
    `map(fib)` — no lambda wrapper needed.
    `if`/`then:`/`else:` returns a value, not just for side effects.
    From also:
    `f * g` composes functions: `(dec * fib)(n)` = `dec(fib(n))`.
    `(1 .. n).map(dec * fib)` gives `fib(0)..fib(n-1)` — avoids
    the `0 .. (n - 1)` expression entirely.
    `:joins` joins a sequence with spaces.
    `n.--` is the decrement operator (n - 1); chain for `n - 2`:
    `n.--.--`.
    `n.--:fib` = `fib(n - 1)` — decrement then colon-chain to `fib`.
    `add: arg1 \n arg2` — `add` as block form with two indented args.
    When the then-branch is complex and the else-branch is simple,
    consider reversing the condition so the complex form comes first
    (no `then:` key needed) and the simple form becomes `else:`.
    Not essential, but often cleaner.

- id: session-002-I
  level: 2
  prompt: |
    Write a program that prints a factorial table for 1 through N
    (default 10), one per line in the form "N! = result".
  clojure: |
    (defn factorial [n]
      (reduce * (range 1 (inc n))))

    (defn -main [& [n]]
      (let [n (Integer/parseInt (or n "10"))]
        (doseq [i (range 1 (inc n))]
          (println (str i "! = " (factorial i))))))
  yamlscript: |
    !ys-0
    defn main(n=10):
      each i (1 .. n):
        say: "$i! = $(factorial(i))"

    defn factorial(n):
      (1 .. n).reduce(fn([a b] (a * b)))
  better:
  - |
    !ys-0
    defn main(n=10):
      each i (1 .. n):
        say: "$i! = $(factorial(i))"

    defn factorial(n):
      reduce _ (1 .. n):
        fn(a b): a * b
  - |
    !ys-0
    defn main(n=10):
      each i (1 .. n):
        say: "$i! = $(factorial(i))"

    defn factorial(n):
      reduce mul: 1 .. n
  notes: |
    `reduce(*)` fails — `*` is interpreted as the splat operator, not
    the multiplication function. Use `fn([a b] (a * b))` instead.
    In inline `fn` bodies, expressions without parens are evaluated
    independently: `fn([a b] a * b)` returns just `b` (last expr).
    Wrap the expression: `fn([a b] (a * b))`.
    `"$i! = ..."` — the `!` after `$i` is a literal character; YS
    variable interpolation ends at non-alphanumeric characters.
    From better:
    `reduce _ (1 .. n): fn(a b): a * b` — `_` is a placeholder
    replaced by the block value, so the call becomes
    `(reduce fn-body (1..n))`; `fn(a b): body` is the block form
    of a two-arg fn (valid because it's not inline YAML).
    `reduce mul: 1 .. n` — `mul` is the named multiplication
    function, usable where `*` would be misread as splat.
    Named arithmetic fns: `add`, `sub`, `mul`, `div` — pass these
    anywhere a function is expected instead of the operator symbols.

- id: session-002-J
  level: 3
  prompt: |
    Write a program that prints the Collatz sequence starting from N
    (default 27), followed by its length.
  clojure: |
    (defn collatz-step [n]
      (if (even? n) (/ n 2) (+ (* n 3) 1)))

    (defn collatz [n]
      (conj (vec (take-while #(not= % 1)
                              (iterate collatz-step n))) 1))

    (defn -main [& [n]]
      (let [n   (Integer/parseInt (or n "27"))
            seq (collatz n)]
        (println (clojure.string/join " " seq))
        (println (str "Length: " (count seq)))))
  yamlscript: |
    !ys-0
    defn main(n=27):
      steps =: collatz(n)
      say: "Length: $(steps.#)"
      say: steps:joins

    defn collatz(n):
      steps =: collatz-step.iterate(n)
                           .take-while(\(_ != 1))
      =>: vec(steps).conj(1)

    defn collatz-step(n):
      if even?(n):
        then: n / 2
        else: n.mul(3).add(1)
  better: |
    !ys-0
    defn main(n=27):
      steps =: collatz(n)
      say: "Length: $(steps.#)"
      say: steps:joins

    defn collatz(n):
      steps =: collatz-step
        .iterate(n)
        .take-while(\(_ != 1)):V
      conj steps: 1

    defn collatz-step(n):
      if even?(n):
        div n: 2
        add n.mul(3): 1
  notes: |
    `iterate(f x)` returns an infinite lazy sequence; in dot form,
    put `f` as the receiver: `f.iterate(x)` = `(iterate f x)`.
    `n.iterate(collatz-step)` would be wrong — `n` would become the
    first arg, but `iterate` expects the function first.
    `take-while(\(_ != 1))` stops the lazy sequence before 1.
    Cannot mix different operators without parentheses: `n * 3 + 1`
    is illegal — same operator is fine (`a * b * c`) but mixing
    requires parens: `(n * 3) + 1`. Use named fns to avoid the
    issue entirely: `n.mul(3).add(1)`.
    A bare function call at the end of a block body needs `=>:`;
    YAML requires a mapping pair, not a loose expression.
    `:joins` joins a sequence with spaces — works on numbers too.
    From better:
    Chain can split with the function on its own line before `.method`:
    `collatz-step \n .iterate(n)` — receiver on one line, calls below.
    `:V` converts a sequence to a vector (shorthand for `:vec`).
    `conj steps: 1` — pair form: `fn arg1: arg2` = `(fn arg1 arg2)`.
    `div n: 2` = `(div n 2)` and `add n.mul(3): 1` = `(add (* n 3) 1)`
    — pair form for named operator fns is clean in if/else branches.

- id: session-002-K
  level: 2
  prompt: |
    Write a program that takes a text string (default a list of fruit
    names) and prints the words grouped by their first letter, one
    group per line, sorted alphabetically.
  clojure: |
    (defn -main [& [text]]
      (let [text  (or text "apple banana cherry avocado blueberry apricot")
            words (clojure.string/split text #"\s+")
            groups (group-by first words)]
        (doseq [[letter ws] (sort groups)]
          (println (str letter ": " (clojure.string/join " " ws))))))
  yamlscript: |
    !ys-0
    defn main(text='apple banana cherry avocado blueberry apricot'):
      words =: text.split(/\s+/)
      each [letter ws] first.group-by(words):sort:
        say: "$letter: $(ws:joins)"
  yamlscript: |
    !ys-0
    
    default-text =::
      apple banana cherry
      avocado blueberry apricot
    
    defn main(text=default-text):
      words =: text:words
      each [letter ws] words.group-by(first _):sort:
        say: "$letter: $(ws:joins)"
  notes: |
    `=::` assigns a YAML block scalar — write a multi-line string
    without quotes; newlines are folded to spaces.
    `:words` splits text into a sequence of words (zero-arg).
    `coll.group-by(f _)` — `_` is the receiver placeholder, so
    `words.group-by(first _)` = `(group-by first words)`, keeping
    the function first as `group-by` requires.
    `:sort` on a map sorts entries by key, returning ordered pairs.
    `each [letter ws]` destructures each sorted map entry into key
    and value.

- id: session-002-L
  level: 3
  prompt: |
    Write a program that prints the first N rows of Pascal's triangle
    (default 6), one row per line with values separated by spaces.
  clojure: |
    (defn next-row [row]
      (mapv + (concat [0] row) (conj row 0)))

    (defn -main [& [n]]
      (let [n (Integer/parseInt (or n "6"))]
        (doseq [row (take n (iterate next-row [1]))]
          (println (clojure.string/join " " row)))))
  yamlscript: |
    !ys-0
    defn main(n=6):
      start =: +[1]
      each row next-row.iterate(start).take(n):
        say: row:joins

    defn next-row(row):
      left =: vec([0]).concat(row)
      right =: row.conj(0)
      =>: mapv(add left right)
  better: |
    !ys-0
    defn main(n=6):
      ? each row
        next-row
          .iterate([1])
          .take(n)
      : say: row:joins

    defn next-row(row):
      left =: +[0] + row
      # left =: ([0] + row)  # is another way to do it
      right =: row + [0]
      mapv add: left right
  notes: |
    `+` before `[...]` is a YAML escape: YAML would parse `[...]`
    as a flow sequence, making the rest of the line invalid. The
    leading `+` turns the whole value into a plain scalar; YS then
    strips the `+` and parses the expression.
    Inside YeS expressions (inside parens), the `+` escape is not
    needed — `[1]` is already in expression context: `.iterate([1])`
    works fine, as does `([0] + row)`.
    `mapv(f c1 c2)` maps over two sequences simultaneously and
    returns a vector. Use `mapv` not `map` when subsequent code
    calls `conj` — `conj` on a lazy seq prepends, but on a vector
    it appends.
    From better:
    `? expr : body` — YAML complex key syntax: `?` introduces a
    multi-line key expression, `:` introduces the value. Lets a
    complex collection pipeline appear without an intermediate
    variable: `? each row next-row.iterate([1]).take(n) : body`.
    `+[0] + row` — `+` escapes `[0]` at YAML value level; `+ row`
    concatenates. `row + [0]` works because `row` starts the scalar.
    `([0] + row)` also works — inside parens, `[0]` is expression.
    `mapv add: left right` — pair form with two args after `:`.

- id: session-002-M
  level: 2
  prompt: |
    Write a program that takes a space-separated list of votes
    (default: 'alice bob alice charlie alice bob') and prints each
    candidate with their vote count, sorted from most to least.
  clojure: |
    (defn -main [& [text]]
      (let [text  (or text "alice bob alice charlie alice bob")
            votes (clojure.string/split text #"\s+")
            tally (reduce (fn [acc v] (update acc v (fnil inc 0)))
                          {} votes)]
        (doseq [[name count] (reverse (sort-by val tally))]
          (println (str name ": " count)))))
  yamlscript: |
    !ys-0
    defn main(text='alice bob alice charlie alice bob'):
      votes =: text:words
      m =: +{}
      tally =: reduce(fn([acc v] acc.update(v (fnil inc 0))) m votes)
      each [name count] tally.sort-by(val):reverse:
        say: "$name: $count"
  also: |
    !ys-0
    text =: 'alice bob alice charlie alice bob'
    defn main(text=text):
      data =: !reverse
        sort-by val:
          reduce _ {} text:words:
            \(_1.update(_2 inc.fnil(0)))
      each [name count] data:
        say("$name:\ $count")
  notes: |
    `+{}` splits inside function call args — assign to a variable
    first: `m =: +{}`.
    `reduce(f init coll)` — three-arg form with initial value;
    in dot chain the receiver becomes the collection, not the init,
    so use the direct call form when an init value is needed.
    `update(m k f)` applies `f` to the current value at `k` in map
    `m`; if `k` is absent, passes `nil` to `f`.
    `fnil(f default)` wraps `f` so it uses `default` when passed
    `nil` — `(fnil inc 0)` starts counting missing keys from 0.
    From also:
    Top-level variable as default: `val =: '...' \n defn main(x=val):`
    — cleaner than a long literal inline in the arg list.
    `data =: !reverse \n sort-by val: \n reduce ...` — `!fn` tag
    chains nested block forms without extra indentation; each level
    is the argument to the `!fn` above it.
    `_1`, `_2` — numbered implicit args in `\(...)` for multi-arg
    lambdas: `\(_1.update(_2 f))` = two-arg fn `(fn [a b] ...)`.
    `f.fnil(default)` — `fnil` via dot chain.
    In scalar expressions, `: ` would trigger colon-chain syntax and
    ` #` would start a YAML comment. Escape them with `:\` and ` \#`
    respectively: `say("$name:\ $count")`.
