# Teaching session: session-004
# Focus: Sieve of Eratosthenes — tag form, + escape scope, lambda style
# All attempts tested with: /tmp/ys-skill/bin/ys -ce or -c -

- id: session-004-A
  level: 2
  prompt: |
    Write a Sieve of Eratosthenes program that prints all primes up to
    a given limit (default 100).
  clojure: |
    (defn sieve [xs]
      (when (seq xs)
        (let [p (first xs)]
          (cons p (sieve (filter #(pos? (mod % p)) (rest xs)))))))

    (defn -main [& [limit]]
      (let [limit (or limit 100)
            primes (when (>= limit 2) (sieve (range 2 (inc limit))))]
        (println (clojure.string/join " " primes))))
  yamlscript: |
    !yamlscript/v0

    defn main(limit=100):
      primes =: limit.ge(2).if(sieve(2 .. limit) +[])
      say: primes.join(' ')

    defn sieve(xs):
      when xs:seq:
        p =: xs:first
        cons p:
          sieve:
            filter fn([x] pos?(x % p)):
              xs:rest
  better: |
    !ys-0

    defn main(limit=100):
      primes =:
        when limit > 2:
          sieve(2 .. limit)
      say: primes:joins

    defn sieve(xs):
      when xs:seq:
        p =: xs:first
        cons p:
          sieve:
            filter \(pos?(_ % p)):
              xs:rest
  notes: |
    Tag form: always use `!ys-0` — the short idiomatic form.
    `!yamlscript/v0` is legacy and verbose; do not use it.
    `+` escape is ONLY valid at the very start of a YAML value plain
    scalar. In `sieve(2 .. limit) +[]`, the `+[]` is NOT an escaped
    empty vector — it is vector addition (`+` operator applied to the
    sieve result and `[]`), which is a no-op that silently corrupts
    the output. To get an empty vector fallback, use `when` or `if`
    with a proper else branch.
    Named comparison operators (`ge`, `lt`, etc.) are for creating
    predicates to pass to higher-order functions (`filter ge(10)`,
    `drop-while lt(0)`). For simple inline comparisons, use the
    symbolic operator directly: `limit > 2` not `limit.ge(2)`.
    Prefer `\(pos?(_ % p))` over `fn([x] pos?(x % p))` for
    single-expression lambdas. Use `fn` only when you need
    destructuring or multiple args that `_` can't express.
    `primes:joins` joins with a space — shorter than `primes.join(' ')`.
