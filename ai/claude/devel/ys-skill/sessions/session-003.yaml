# Teaching session: session-003
# Focus: YAMLScript standard library (ys.std)
# All attempts tested with: /tmp/ys-skill/bin/ys -ce or -c -

- id: session-003-A
  level: 1
  prompt: |
    Write a program that takes a space-separated list of words (default:
    'apple banana cherry fig') and checks each against a known fruit
    list, printing whether it is a fruit or unknown.
  clojure: |
    (def fruits #{"apple" "cherry" "grape" "kiwi"})

    (defn -main [& [text]]
      (let [text (or text "apple banana cherry fig")]
        (doseq [w (clojure.string/split text #"\s+")]
          (if (contains? fruits w)
            (println (str w " is a fruit"))
            (println (str w " is unknown"))))))
  yamlscript: |
    !ys-0
    defn main(text='apple banana cherry fig'):
      fruits =: qw(apple cherry grape kiwi)
      each w text:words:
        if w.in?(fruits):
          say: "$w is a fruit"
          else:
            say: "$w is unknown"
  better: |
    !ys-0
    defn main(text='apple banana cherry fig'):
      fruits =: qw(apple cherry grape kiwi)
      each w text:words:
        if w.in?(fruits):
          say: "$w is a fruit"
          say: "$w is unknown"
  notes: |
    `qw(word1 word2 ...)` — quoted word list; creates a vector of
    strings without needing quotes around each word.
    `x.in?(coll)` — tests membership; `has?(coll x)` is the flipped
    form. Both work on strings, vectors, sets, and maps.
    `else:` with a nested `say:` pair must be a block (indented),
    not inline — `else: say: value` causes a YAML parse error.
    From better: two consecutive pairs in an `if` block are the
    then and else branches — no `else:` key needed at all when
    both branches are single pairs.

- id: session-003-B
  level: 1
  prompt: |
    Write a program that takes multi-line text (default: a mix of comment
    and code lines) and prints only the comment lines (those starting
    with '#').
  clojure: |
    (defn -main [& [text]]
      (let [text (or text "# greeting\nhello world\n# sign-off\ngoodbye")]
        (doseq [line (clojure.string/split-lines text)
                :when (clojure.string/starts-with? line "#")]
          (println line))))
  yamlscript:
  - |
    !ys-0
    defn main(text="# greeting\nhello world\n# sign-off\ngoodbye"):
      each line text:lines.grep(/^\#/):
        say: line
  - |
    !ys-0
    defn main(text="# greeting\nhello world\n# sign-off\ngoodbye"):
      each line text:lines.filter(\(_.starts?('#'))):
        say: line
  better:
  - |
    !ys-0
    dflt =: |-
      # greeting
      hello world
      # sign-off
      goodbye

    defn main(text=dflt):
      each line text:lines.grep(/^\#/):
        say: line
  notes: |
    `text:lines` — splits a string on newlines; returns a vector.
    `grep(P C)` — like Perl's grep; P can be a regex (uses `re-find`),
    a function (uses `filter`), or a value (uses `=`). Has its own
    arg-swapping logic (not in the DWIM list) so dot-chaining works
    naturally: `coll.grep(regex)`.
    `starts?(s prefix)` — true if string s starts with prefix.
    Flipped: `s.starts?(prefix)`. Counterpart: `ends?(s suffix)`.
    From better: for multi-line default text, use a top-level block
    scalar variable: `dflt =: |-\n  line1\n  line2` then
    `defn main(text=dflt):`. This avoids the YAML plain scalar
    restriction that forbids `: ` (colon-space) inside default values
    written as `\n`-escaped double-quoted strings.
    Block scalar programs must be tested via a file, not a heredoc —
    the `<<<'...'` heredoc form doesn't parse block scalars correctly.

- id: session-003-C
  level: 2
  prompt: |
    Write a program that computes the digital root of a number: repeatedly
    sum its digits until a single digit remains. Default input: 493.
  clojure: |
    (defn digit-sum [n]
      (reduce + (map #(Integer/parseInt (str %)) (str n))))

    (defn digital-root [n]
      (if (< n 10) n (recur (digit-sum n))))

    (defn -main [& [n]]
      (println (digital-root (or n 493))))
  yamlscript:
  - |
    !ys-0
    defn digital-root(n):
      if n >= 10:
        recur: sum(digits(n))
        else: n

    defn main(n=493):
      say: digital-root(n)
  - |
    !ys-0
    defn main(n=493):
      f =: fn([x] sum(digits(x)))
      say: f.iterate(n).drop-while(\(_ >= 10)):first
  also:
  - |
    !ys-0
    say1 =: first * say
    defn main(n=493): !say1
      drop-while ge(10):
        iterate _ n:
          fn(x):
            sum: digits(x)
  notes: |
    `digits(n)` — converts integer to a vector of decimal digits.
    `sum(xs)` — sums a collection (filters nil/false first).
    `recur` works in named `defn` bodies for self tail-recursion.
    `else: n` — bare scalar value as an `else` branch works fine.
    `.first` (dot without parens) is a property/key lookup — compiles
    to `get+`, returns nil. For the zero-arg function `first`, use
    `:first` (colon chain). Same applies to any zero-arg function that
    could be confused with a property name.
    From also: `f * g` — left-to-right composition; applies `f` first
    then `g`. So `first * say` = apply `first`, then pass result to `say`.
    Named comparison operators called with 1 arg return predicates:
    `ge(n)` → `(fn [x] (>= x n))`. Similarly `lt(n)` → `x < n`,
    `gt(n)` → `x > n`, `le(n)` → `x <= n`, `eq(n)` → `x = n`.
    `iterate _ n: fn(x): body` — block form; `_` is placeholder for
    the function (block value), `n` is the seed. `fn(x):` is valid in
    block context (but NOT inline — `: ` splits inline expressions).
    `!fn` tag on a `defn` pair value — applies `fn` to the result of
    the body block; here `defn main(n=493): !say1` applies `say1` to
    whatever the body block evaluates to.

- id: session-003-D
  level: 1
  prompt: |
    Write a program that takes a snake_case string (default:
    'hello_world_foo') and prints it in Title Case with spaces.
  clojure: |
    (defn -main [& [s]]
      (let [s (or s "hello_world_foo")]
        (->> (clojure.string/split s #"_")
             (map clojure.string/capitalize)
             (clojure.string/join " ")
             println)))
  yamlscript:
  - |
    !ys-0
    defn main(s='hello_world_foo'):
      say: s.split(/_/).map(uc1):joins
  - |
    !ys-0
    defn main(s='hello_world_foo'):
      say:
        joins:
          map uc1:
            split s: /_/
  also: |
    !ys-0
    defn main(s='hello_world_foo'):
      (map + uc1) * joins * say:
        split s: /_/
  notes: |
    `uc1(s)` — capitalizes the first character, leaves the rest as-is.
    Counterpart to `lc` and `uc`. Use dot form: `w.uc1`.
    `joins(coll)` — joins a collection into a string with spaces.
    `join(sep coll)` — joins with a custom separator; no sep = `join("")`.
    Both `join` and `split` have their own arg-swapping (not in DWIM
    list): `split(s regex)` or `split(regex s)` both work.
    Block form multi-arg: `f x: arg` calls `f(x, arg)` where `arg` is
    the block value — useful for keeping the data flow vertical.
    From also: `f + arg` — when `f` is a function, `+` creates a
    partial application: `map + uc1` = `(partial map uc1)`, a function
    that maps `uc1` over any collection. Combine with `*` to build
    pipelines: `(map + uc1) * joins * say` maps, joins, then prints.

- id: session-003-E
  level: 1
  prompt: |
    Write a program that converts a camelCase string (default:
    'helloWorldFoo') to kebab-case.
  clojure: |
    (defn -main [& [s]]
      (let [s (or s "helloWorldFoo")]
        (println
          (clojure.string/lower-case
            (clojure.string/replace s #"([A-Z])" "-$1")))))
  yamlscript:
  - |
    !ys-0
    defn main(s='helloWorldFoo'):
      say: s.replace(/([A-Z])/ '-$1'):lc
  - |
    !ys-0
    defn main(s='helloWorldFoo'):
      say:
        lc:
          replace s /([A-Z])/: '-$1'
  also:
  - |
    !ys-0
    defn main(s='helloWorldFoo'):
      lc * say:
        s.replace(/([A-Z])/ '-$1')
  notes: |
    `replace(s pattern repl)` — replaces all matches of pattern in s.
    Pattern can be a regex or string; replacement can use `$1`, `$2`
    etc. for capture groups.
    `replace(s pattern)` — no replacement arg removes all matches
    (defaults to `""`).
    `replace1(s pattern repl)` — replaces only the first match.
    `replace` and `replace1` have arg-swapping: `s.replace(pat repl)`
    and `replace(pat s repl)` both work.
    From also: when block keys are consecutive single-word functions,
    combine them with `*` to avoid nesting: `lc * say: value` instead
    of `say:\n  lc: value`. Applies left-to-right: `lc` first, then `say`.

- id: session-003-F
  level: 1
  prompt: |
    Write a program that prints the alphabet with each letter's
    1-based position (a=1, b=2, ..., z=26).
  clojure: |
    (defn -main []
      (doseq [[i c] (map-indexed vector (map char (range (int \a) (inc (int \z)))))]
        (println (str (inc i) ": " c))))
  yamlscript:
  - |
    !ys-0
    defn main():
      each [i c] rng(C("a") C("z")).map-indexed(vector _):
        say: "$(i:inc): $c"
  - |
    !ys-0
    defn main():
      alpha =: rng(C("a") C("z"))
      each [i c] alpha.map-indexed(vector _):
        say: "$(i:inc): $c"
  better:
  - |
    !ys-0
    defn main():
      pairs =:
        map-indexed V+:
          \\a .. \\z
      each [i c] pairs:
        say: "$(i.++): $c"
  notes: |
    `rng(x y)` — inclusive range; works with integers (forward or
    backward) and with chars via `C()`: `rng(C("a") C("z"))`.
    `C("a")` — converts a single-character string to a Clojure char.
    `\\a` — Clojure char literal syntax; in a YAML block scalar the
    backslash must be doubled: `\\a .. \\z` gives the same char range
    as `rng(C("a") C("z"))`. In a YS temp file written directly,
    use `\a .. \z`.
    `V+` — YS alias for `vector`; `map-indexed V+` = `map-indexed vector`.
    `map-indexed` takes `(f coll)` — not DWIM, use `_` to place the
    receiver in the right position: `coll.map-indexed(f _)`.
    In string interpolation, named zero-arg calls need colon chain:
    `$(i:inc)` not `$(i.inc)` — `.name` without parens is a property
    lookup (nil). Special postfix operators like `.++` are different —
    `$(i.++)` works because `.++` compiles to `inc+()`, not a lookup.

- id: session-003-G
  level: 2
  prompt: |
    Write a FizzBuzz program: for numbers 1..n (default 20), print
    'FizzBuzz' if divisible by 15, 'Fizz' if by 3, 'Buzz' if by 5,
    or the number itself.
  clojure: |
    (defn fizzbuzz [n]
      (cond
        (zero? (mod n 15)) "FizzBuzz"
        (zero? (mod n 3))  "Fizz"
        (zero? (mod n 5))  "Buzz"
        :else              n))

    (defn -main [& [n]]
      (doseq [i (range 1 (inc (or n 20)))]
        (println (fizzbuzz i))))
  yamlscript: |
    !ys-0
    defn fizzbuzz(n):
      cond:
        (n % 15).!: 'FizzBuzz'
        (n % 3).!: 'Fizz'
        (n % 5).!: 'Buzz'
        else: n

    defn main(n=20):
      each i (1 .. n):
        say: fizzbuzz(i)
  notes: |
    `.!` — YS falsey check: `falsey?(x)`. Returns `true` for 0,
    empty collections, nil, and false; `false` otherwise.
    YS truth semantics differ from Clojure: 0 and empty collections
    are falsey. Use `.!` to check `(n % k).!` instead of
    `zero?(n % k)`.
    `.?` — YS truey check: returns the value if truey, nil otherwise.
    `.#` — count shorthand: `xs.#` = `count(xs)`. Works on strings
    too (but store in a variable first — a trailing ` #` would be
    parsed as a YAML comment).
    `.++` — `inc+`: increments a number or advances a char.
    `.--` — `dec+`: decrements a number or retreats a char.
    `.$` — `last`: last element of a collection.
    `.@` — `deref`: dereference an atom.
    `.>` — `DBG`: debug-print the value and pass it through (returns
    the value unchanged).
    `.??` — `boolean`: standard Clojure truth (only nil/false false).
    `.!!` — `not`: standard Clojure not.

- id: session-003-H
  level: 2
  prompt: |
    Write a program that counts word frequencies in a text (default:
    'the cat sat on the mat the cat') and prints them sorted by
    frequency, highest first.
  clojure: |
    (defn -main [& [text]]
      (let [text (or text "the cat sat on the mat the cat")]
        (doseq [[w n] (->> (clojure.string/split
                             (clojure.string/lower-case text) #"\s+")
                           frequencies
                           (sort-by val)
                           reverse)]
          (println (str n " " w)))))
  yamlscript:
  - |
    !ys-0
    defn main(text='the cat sat on the mat the cat'):
      pairs =: text:lc:words:frequencies.sort-by(val):reverse
      each [w n] pairs:
        say: "$n $w"
  - |
    !ys-0
    defn main(text='the cat sat on the mat the cat'):
      words =: text:lc:words
      pairs =: words:frequencies.sort-by(val):reverse
      each [w n] pairs:
        say: "$n $w"
  also:
  - |
    !ys-0
    defn main(text='the cat sat on the mat the cat'):
      ? each [w n]
          text:lc:words:frequencies
            .sort-by(val):reverse
      : say: "$n $w"
  notes: |
    `words` — zero-arg; splits a string on whitespace. Colon chain:
    `text:words`. Equivalent to `split(text /\s+/)` but terser.
    `frequencies` — zero-arg; returns a map of item → count.
    `lc`, `words`, `frequencies` are all zero-arg, so chain with
    colons: `text:lc:words:frequencies`.
    `sort-by(val)` — sorts map entries by their value; `val` is
    Clojure's first-class function that extracts the value from a
    map entry `[key val]`. `sort-by` is in the DWIM list so the
    map receiver lands in the right position automatically.
    Map entries destructure as `[key value]`, so `each [w n] pairs`
    binds word and count on each iteration.
    From also: `? expr : value` — YAML complex key syntax; lets a
    multi-line pipeline serve as the key of a mapping pair. Useful
    when the pipeline is too long for a single line before the `:`.
    A chain can only be continued onto the next line before a dot
    (`.call`), not before a colon (`:call`). The split in the also
    form falls before `.sort-by` — valid. Splitting before `:reverse`
    would not work.

- id: session-003-I
  level: 1
  prompt: |
    Write a program that takes a name as a CLI argument and prints
    "Hello, <name>!" 5 times.
  clojure: |
    (defn main [name]
      (dotimes [_ 5]
        (println (str "Hello, " name "!"))))
  yamlscript: |
    !ys-0
    defn main(name='World'):
      dotimes [_ 5]:
        say: "Hello, $name!"
  notes: |
    `dotimes [_ n]:` — repeat n times, ignoring the index. Use when
    you don't need the iteration value. `each [_ (1 .. n)]:` also
    works but `dotimes` is clearer for simple repetition.
    Binary operators require whitespace on both sides: `1 .. 5` not
    `1..5`. This includes `..`, `+`, `-`, `*`, `/`, `%`, `||`, `&&`,
    `=~`, `!~`, etc. The dot chain operator `.` is the exception —
    no whitespace needed.
    `defn main(name='World'):` — always give CLI programs a default
    arg so they work without arguments.
