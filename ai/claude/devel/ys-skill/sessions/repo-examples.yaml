# Mined from repo source files via: ys -c <file>
# These are ground-truth YS→Clojure pairs.

- id: fizzbuzz
  source: sample/rosetta-code/fizzbuzz.ys
  ys: |
    !ys-0

    defn main(count=100 impl=1):
      :: |
        Invoke one of the FizzBuzz implementations below.

        usage: ys fizzbuzz.ys [<count> [<implementation-number>]]

      fizzbuzz =: "fizzbuzz-$impl"
      say: "Running function '$fizzbuzz' with count=$count"
      mapv say:
        call fizzbuzz: count

    defn fizzbuzz-1(n):
      :: Implementation 1 - with 'map'
      map _ (1 .. n):
        fn(x):
          cond:
            zero?(x % 15) : 'FizzBuzz'
            zero?(x % 5)  : 'Buzz'
            zero?(x % 3)  : 'Fizz'
            else          : x

    defn fizzbuzz-2(n):
      :: Implementation 2 - with 'loop'
      loop i 1, l []:
        if i <= n:
          recur i.++:
            conj l:
              condp eq 0:
                i % 15 :: FizzBuzz
                i % 5  :: Buzz
                i % 3  :: Fizz
                else   :  i
          else: l

    defn fizzbuzz-3(n):
      :: Implementation 3 - with 'for'
      for x (1 .. n): str(((x % 3).! &&& 'Fizz') ((x % 5).! &&& 'Buzz')) ||| x
  clojure: |
    (defn
     main
     "Invoke one of the FizzBuzz implementations below.\n\nusage: ys fizzbuzz.ys [<count> [<implementation-number>]]\n"
     ([count impl]
      (let
       [fizzbuzz (str "fizzbuzz-" impl)]
       (say (str "Running function '" fizzbuzz "' with count=" count))
       (mapv say (call fizzbuzz count))))
     ([count] (main count 1))
     ([] (main 100 1)))
    (defn
     fizzbuzz-1
     "Implementation 1 - with 'map'"
     [n]
     (map
      (fn
       [x]
       (cond
        (zero? (rem x 15))
        "FizzBuzz"
        (zero? (rem x 5))
        "Buzz"
        (zero? (rem x 3))
        "Fizz"
        :else
        x))
      (rng 1 n)))
    (defn
     fizzbuzz-2
     "Implementation 2 - with 'loop'"
     [n]
     (loop
      [i 1 l []]
      (if
       (<= i n)
       (recur
        (inc+ i)
        (conj
         l
         (condp
          eq
          0
          (rem i 15)
          "FizzBuzz"
          (rem i 5)
          "Buzz"
          (rem i 3)
          "Fizz"
          i)))
       l)))
    (defn
     fizzbuzz-3
     "Implementation 3 - with 'for'"
     [n]
     (for
      [x (rng 1 n)]
      (or?
       (str
        (and? (falsey? (rem x 3)) "Fizz")
        (and? (falsey? (rem x 5)) "Buzz"))
       x)))
    (apply main ARGS)
  notes: |
    Key observations from this file:
    - `map _ (1 .. n): fn(x): ...` — underscore placeholder puts
      collection last; inline fn body is the block value
    - `fizzbuzz-3` uses `&&&` (YS and?) and `|||` (YS or?) operators
    - `condp eq 0: i % 15 :: FizzBuzz` — condp with block form;
      `::` produces literal value (not key-value pair)
    - `i.++` — postfix increment via dot chaining
    - `rng` appears in Clojure output for `..` (inclusive range)
    - `falsey?` for `.!` operator, `and?`/`or?` for `&&&`/`|||`
    - `call fizzbuzz: count` — dynamic dispatch by name string
    - `=:` assignment: `fizzbuzz =: "fizzbuzz-$impl"`
    - Default args expand to multi-arity Clojure defn
