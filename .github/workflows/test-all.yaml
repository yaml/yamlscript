name: Test All

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test-linux:
    name: Test Linux
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run make test-all
      run: make test-all

  test-macos:
    name: Test macOS
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run make test-all
      run: make test-all
