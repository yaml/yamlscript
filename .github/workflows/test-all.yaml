name: Test All

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test-linux:
    name: Test Linux
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Run make test-all
      run: make test-all

  test-macos:
    name: Test macOS
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Run make test-all
      run: make test-all

  test-windows:
    name: Test Windows
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: '17'
        distribution: graalvm
        github-token: ${{ github.token }}
        native-image-job-reports: 'true'

    - name: Install zip
      run: choco install zip -y

    - name: Build native artifacts
      run: |
        make -C ys build
        make -C libys build

    - name: Smoke test CLI
      run: |
        version=$(sed -n 's/^version: //p' Meta)
        ys/bin/ys-$version.exe --version
        result=$(printf 'a: 1\n' | ys/bin/ys-$version.exe --load)
        [[ "$result" == '{"a":1}' ]]
