name: Release YAMLScript

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.10)'
        required: true
        type: string
      bindings:
        description: 'Optional space-separated binding directories'
        required: false
        type: string
      publish_bindings_only:
        description: 'Publish bindings from existing release assets'
        default: false
        required: false
        type: boolean

defaults:
  run:
    shell: bash

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

env:
  VERSION: ${{ inputs.version }}
  JAVA_VERSION: '17'
  YS_RELEASE_CI: '1'
  YS_RELEASE_BINDINGS: ${{ inputs.bindings }}

jobs:
  verify-release:
    name: Verify release
    if: ${{ !inputs.publish_bindings_only }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout tag
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version }}
        fetch-depth: 0

    - name: Check tag and version
      run: |
        if ! [[ "$VERSION" =~ ^0\.[0-9]+\.[0-9]+$ ]]; then
          echo "ERROR: Invalid version: $VERSION"
          exit 1
        fi

        if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
          echo "ERROR: Tag $VERSION does not exist"
          exit 1
        fi

        if [[ $(git rev-parse "$VERSION^{commit}") != \
              $(git rev-parse HEAD) ]]; then
          echo "ERROR: Tag $VERSION does not point to checkout HEAD"
          exit 1
        fi

        if [[ $(sed -n 's/^version: //p' Meta) != "$VERSION" ]]; then
          echo "ERROR: Meta version does not match $VERSION"
          exit 1
        fi

    - name: Check release assets are not already published
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "$VERSION" --json assets --jq '.assets | length' \
           2>/dev/null | grep -q '^[1-9]'; then
          echo "ERROR: Release $VERSION already has assets"
          printf '%s%s\n' \
            "https://github.com/${{ github.repository }}/releases/tag/" \
            "$VERSION"
          exit 1
        fi

  test-linux:
    name: Test Linux
    if: ${{ !inputs.publish_bindings_only }}
    needs: build-linux-x64
    runs-on: ubuntu-latest
    steps:
    - name: Checkout tag
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version }}

    - name: Download Linux artifacts
      uses: actions/download-artifact@v8
      with:
        name: linux-x64
        path: release-artifacts

    - name: Run core tests
      run: make test-core

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Run tests
      run: |
        make test-all \
          YS_RELEASE_SKIP_CORE_TESTS=1 \
          YS_RELEASE_SKIP_HASKELL_TESTS=1

  test-macos:
    name: Test macOS
    if: ${{ !inputs.publish_bindings_only }}
    needs: build-macos-arm64
    runs-on: macos-latest
    steps:
    - name: Checkout tag
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version }}

    - name: Download macOS artifacts
      uses: actions/download-artifact@v8
      with:
        name: macos-arm64
        path: release-artifacts

    - name: Run core tests
      run: make test-core

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Run tests
      run: |
        make test-all \
          YS_RELEASE_SKIP_CORE_TESTS=1 \
          YS_RELEASE_SKIP_HASKELL_TESTS=1

  build-linux-x64:
    name: Build Linux x64
    if: ${{ !inputs.publish_bindings_only }}
    needs: verify-release
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    steps:
    - name: Checkout tag
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version }}

    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: graalvm
        github-token: ${{ github.token }}
        native-image-job-reports: 'true'

    - name: Install build dependencies
      run: |
        apt-get update
        apt-get install -y build-essential curl git zlib1g-dev

    - name: Build release archives
      run: |
        make -C ys build
        make -C libys build
        make release-build jars

    - name: List release archives
      run: ls -lh ys-*.tar.xz libys-*.tar.xz *.jar

    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v7
      with:
        name: linux-x64
        path: |
          ys-*.tar.xz
          libys-*.tar.xz
          *.jar
        retention-days: 7

  build-macos-arm64:
    name: Build macOS ARM64
    if: ${{ !inputs.publish_bindings_only }}
    needs: verify-release
    runs-on: macos-latest
    steps:
    - name: Checkout tag
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version }}

    - name: Set up GraalVM
      uses: graalvm/setup-graalvm@v1
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: graalvm
        github-token: ${{ github.token }}
        native-image-job-reports: 'true'

    - name: Build release archives
      run: |
        make -C ys build
        make -C libys build
        make release-build jars

    - name: List release archives
      run: ls -lh ys-*.tar.xz libys-*.tar.xz *.jar

    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v7
      with:
        name: macos-arm64
        path: |
          ys-*.tar.xz
          libys-*.tar.xz
          *.jar
        retention-days: 7

  create-release:
    name: Create GitHub release
    if: ${{ !inputs.publish_bindings_only }}
    needs:
    - test-linux
    - test-macos
    - build-linux-x64
    - build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout tag
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version }}

    - name: Build release notes
      run: |
        sed "s/YS version .*/YS version $VERSION/" \
          common/release.md > release-notes.txt

        if [[ -f Changes ]]; then
          awk -v ver="$VERSION" '
            /^- version: / && $3 == ver { found = 1; next }
            /^- version: / && found { exit }
            found && $1 != "date:" && $1 != "changes:" { print }
          ' Changes | sed 's/^  - /* /' >> release-notes.txt
        fi

        cat release-notes.txt

    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "$VERSION" >/dev/null 2>&1; then
          echo "Release $VERSION already exists"
        else
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file release-notes.txt \
            --draft=false \
            --prerelease=false
        fi

  upload-assets:
    name: Upload release assets
    if: ${{ !inputs.publish_bindings_only }}
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout tag
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version }}

    - name: Download release artifacts
      uses: actions/download-artifact@v8

    - name: Prepare release assets
      run: |
        find . -type f -name '*.tar.xz' -exec mv {} . \;
        find . -type f -name '*.jar' -exec mv {} . \;
        ls -lh ys-*.tar.xz libys-*.tar.xz *.jar

    - name: Upload release assets
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "$VERSION" \
          ys-*.tar.xz libys-*.tar.xz *.jar --clobber
        gh release view "$VERSION"

  publish-bindings:
    name: Publish language bindings
    if: |
      ${{
        always() &&
        !cancelled() &&
        (
          inputs.publish_bindings_only ||
          needs.upload-assets.result == 'success'
        )
      }}
    needs: upload-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      YS_RELEASE_VERSION_NEW: ${{ inputs.version }}
      GH_TOKEN: ${{ secrets.JULIA_GITHUB_TOKEN || github.token }}
      GITHUB_TOKEN: ${{ secrets.JULIA_GITHUB_TOKEN || github.token }}
      YS_GH_TOKEN: ${{ secrets.JULIA_GITHUB_TOKEN || github.token }}
      CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
      CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      HACKAGE_TOKEN: ${{ secrets.HACKAGE_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
      PACKAGIST_USER: ${{ secrets.PACKAGIST_USER }}
      PACKAGIST_TOKEN: ${{ secrets.PACKAGIST_TOKEN }}
      PAUSE_USER: ${{ secrets.PAUSE_USER }}
      PAUSE_PASS: ${{ secrets.PAUSE_PASS }}
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
      CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
      FEZ_TOKEN: ${{ secrets.FEZ_TOKEN }}
      BINDING_REPO_SSH_KEY: ${{ secrets.BINDING_REPO_SSH_KEY }}
    steps:
    - name: Checkout tag
      uses: actions/checkout@v6
      with:
        ref: >-
          ${{
            inputs.publish_bindings_only &&
            github.ref ||
            inputs.version
          }}
        fetch-depth: 0

    - name: Download Linux workflow artifacts
      if: ${{ !inputs.publish_bindings_only }}
      uses: actions/download-artifact@v8
      with:
        name: linux-x64
        path: release-artifacts

    - name: Download Linux release assets
      if: ${{ inputs.publish_bindings_only }}
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        mkdir -p release-artifacts
        gh release download "$VERSION" \
          --repo "${{ github.repository }}" \
          --pattern '*.tar.xz' \
          --pattern '*.jar' \
          --dir release-artifacts
        ls -lh release-artifacts

    - name: Install release artifacts
      run: util/install-release-artifacts release-artifacts

    - name: Configure mirror repo SSH key
      if: ${{ env.BINDING_REPO_SSH_KEY != '' }}
      uses: webfactory/ssh-agent@v0.10.0
      with:
        ssh-private-key: ${{ env.BINDING_REPO_SSH_KEY }}

    - name: Configure Maven credentials
      run: |
        mkdir -p ~/.m2
        cat > ~/.mvn-user-settings.xml <<EOF
        <settings>
          <servers>
            <server>
              <id>clojars</id>
              <username>${CLOJARS_USERNAME}</username>
              <password>${CLOJARS_PASSWORD}</password>
            </server>
          </servers>
        </settings>
        EOF

    - name: Configure npm credentials
      run: |
        if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
          echo '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' \
            > ~/.npmrc
        fi

    - name: Configure Git identity
      run: |
        git config --global user.name 'YAMLScript Release Bot'
        git config --global user.email 'yamlscript-release@yaml.io'

    - name: Publish bindings
      run: |
        export clojars_username="$CLOJARS_USERNAME"
        export clojars_password="$CLOJARS_PASSWORD"
        make release-bindings n="$VERSION" YS="$PWD/ys/bin/ys-$VERSION"

  publish-website:
    name: Publish website
    if: ${{ !inputs.publish_bindings_only }}
    needs: publish-bindings
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
    - name: Checkout tag
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.version }}
        fetch-depth: 0

    - name: Publish website
      run: make release-website
